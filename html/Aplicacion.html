<!DOCTYPE html>
<html>

    <title>AR City Tour</title>
    <link rel="stylesheet" href="/css/Aplicacion.css">
</head>

        <h1>AR City Tour</h1>

            <div class="checkbox-container">
                <input type="checkbox" id="remember">
                <label for="remember">Recordar</label>
            </div>

            <a href="/html/Principal.html">Volver al inicio</a>
            <a href="/html/Inicio.html">Entrar</a>
            <a href="/html/RecuperarContrasena.html">¿Ha olvidado su contraseña?</a>
            <a href="/html/Registrar.html">Registrarse</a>
        </form>
        <p id="inicio">&copy; AR City Tour</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
