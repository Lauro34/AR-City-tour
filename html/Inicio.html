<!DOCTYPE html>
<html>
<head>
    <title>AR City Tour - Principal</title> <!-- El título que aparecerá en la pestaña del navegador -->
    <link rel="stylesheet" href="/css/Inicio.css"> <!-- Enlaza el archivo CSS externo para estilizar esta página -->
</head>
<body>
    <button class="btn-inicio" onclick="window.location.href='/html/Principal.html'">Volver al inicio</button>
    <!-- Contenedor principal de la página -->
    <div class="main-container">
        <!-- Título de la página principal de la aplicación -->
        <h1>AR City Tour</h1>

        <!-- Contenedor para las opciones de navegación (Mapa y Cámara) -->
        <div class="options">
            <!-- Enlace que dirige al usuario a la página del mapa -->
            <a href="/html/Mapa.html" class="option">
                <!-- Ícono de un mapa (emoji) -->
                <div class="icon">&#x1F5FA;</div>
                <!-- Texto debajo del ícono -->
                <h2>Mapa</h2>
            </a>

            <!-- Enlace que dirige al usuario a la página de la cámara -->
            <a href="/html/Camara.html" class="option">
                <!-- Ícono de una cámara (emoji) -->
                <div class="icon">&#x1F4F7;</div>
                <!-- Texto debajo del ícono -->
                <h2>Cámara</h2>
            </a>
        </div>
    </div>
</body>
</html>
